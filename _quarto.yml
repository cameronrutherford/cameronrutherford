---
project:
  type: website
  title: "Cameron's git-site"
  output-dir: docs

profile:
  group:
    - [base, cpp, python, devops, onepager, hrt]

format:
  html:
    theme:
      light: flatly
      dark: darkly
    default: true
    toc: true
    toc-depth: 4

execute:
  eval: false
  warning: true
  error: true
  echo: true
  cache: true
  freeze: true

website:
  repo-url: https://github.com/cameronrutherford/cameronrutherford
  repo-actions: [edit]
  search:
    type: overlay
  navbar:
    search: true
    left:
      # - text: "CV"
      #  file: resume/resume.qmd
      - text: "Site Configuration"
        menu:
          - config/devcontainer.qmd
          - config/github-actions.qmd
          - config/pre-commit.qmd
          - config/quickstart.qmd
          - config/quarto.qmd
      - text: "Presentations"
        menu:
          - presentations/aws-hpc/presentation.qmd
    tools:
      - icon: twitter
        href: https://twitter.com/cam_rutherford_
        text: Quarto Twitter
      - icon: github
        href: https://github.com/cameronrutherford
        text: Quarto GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/robert-c-rutherford/
        text: LinkedIn
